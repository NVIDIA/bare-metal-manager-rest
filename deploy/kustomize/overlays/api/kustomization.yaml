# Overlay for API deployment customization.
# Customize images, replicas, or add patches for carbide-rest-api here.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

generatorOptions:
  disableNameSuffixHash: true

namespace: carbide-rest

resources:
  - ../../base

images:
  - name: carbide-rest-api:latest
    newName: nvcr.io/nvidian/nvforge-devel/carbide-rest-api
    newTag: v1.0.2

# Add patches under patches/ or list them here, e.g.:
# patches:
#   - path: patches/replicas.yaml
#     target:
#       kind: Deployment
#       name: carbide-rest-api
