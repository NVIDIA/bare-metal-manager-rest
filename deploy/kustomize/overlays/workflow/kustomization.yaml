# Overlay for workflow (cloud-worker) deployment customization.
# Customize images, replicas, or add patches for cloud-worker here.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

generatorOptions:
  disableNameSuffixHash: true

namespace: carbide-rest

resources:
  - ../../base

# Override registry/tag for workflow image (base uses carbide-rest-workflow:latest)
images:
  - name: carbide-rest-workflow:latest
    newName: nvcr.io/nvidian/nvforge-devel/cloud-workflow
    newTag: v0.1.16

# Add patches under patches/ or list them here, e.g.:
# patches:
#   - path: patches/replicas.yaml
#     target:
#       kind: Deployment
#       name: cloud-worker
