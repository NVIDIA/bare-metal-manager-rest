# Kustomize overlay for local Kind development.
# Base uses short image refs (e.g. carbide-rest-api:latest) and imagePullSecrets
# (imagepullsecret) for registry access.
# This overlay sets registry/tag for local (localhost:5000, latest) and clears
# imagePullSecrets (no auth for local).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: carbide-rest

resources:
  - ../../base

# Image overrides: map base refs to local registry and tag
images:
  - name: carbide-rest-api:latest
    newName: localhost:5000/carbide-rest-api
    newTag: latest
  - name: carbide-rest-workflow:latest
    newName: localhost:5000/carbide-rest-workflow
    newTag: latest
  - name: carbide-rest-site-manager:latest
    newName: localhost:5000/carbide-rest-site-manager
    newTag: latest
  - name: carbide-rest-site-agent:latest
    newName: localhost:5000/carbide-rest-site-agent
    newTag: latest
  - name: carbide-rest-db:latest
    newName: localhost:5000/carbide-rest-db
    newTag: latest
  - name: carbide-rest-cert-manager:latest
    newName: localhost:5000/carbide-rest-cert-manager
    newTag: latest
  - name: carbide-rest-mock-core:latest
    newName: localhost:5000/carbide-rest-mock-core
    newTag: latest

# Patches: clear imagePullSecrets for local (no registry auth); set imagePullPolicy: Never for app images
patches:
  # API
  - target:
      kind: Deployment
      name: carbide-rest-api
    patch: |-
      - op: replace
        path: /spec/template/spec/imagePullSecrets
        value: []
      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
  # Cloud Worker
  - target:
      kind: Deployment
      name: cloud-worker
    patch: |-
      - op: replace
        path: /spec/template/spec/imagePullSecrets
        value: []
      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
  # Site Worker
  - target:
      kind: Deployment
      name: site-worker
    patch: |-
      - op: replace
        path: /spec/template/spec/imagePullSecrets
        value: []
      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
  # Site Agent
  - target:
      kind: Deployment
      name: carbide-rest-site-agent
    patch: |-
      - op: replace
        path: /spec/template/spec/imagePullSecrets
        value: []
      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
  # Cert Manager
  - target:
      kind: Deployment
      name: carbide-rest-cert-manager
    patch: |-
      - op: replace
        path: /spec/template/spec/imagePullSecrets
        value: []
      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
  # Site Manager
  - target:
      kind: Deployment
      name: carbide-rest-site-manager
    patch: |-
      - op: replace
        path: /spec/template/spec/imagePullSecrets
        value: []
      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
  # Mock Core (base has imagePullPolicy already, so replace not add)
  - target:
      kind: Deployment
      name: carbide-rest-mock-core
    patch: |-
      - op: replace
        path: /spec/template/spec/imagePullSecrets
        value: []
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never
  # DB migrations Job
  - target:
      kind: Job
      name: db
    patch: |-
      - op: replace
        path: /spec/template/spec/imagePullSecrets
        value: []
      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never

commonLabels:
  environment: local
