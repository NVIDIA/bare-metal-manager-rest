# Overlay for db (migrations) and postgres deployment customization.
# Customize images or add patches for the db Job (migrations) and postgres here.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: carbide-rest

resources:
  - ../../base

# Example: override db (migrations) image
# images:
#   - name: carbide-rest-db:latest
#     newName: your-registry/carbide-rest-db
#     newTag: v1.0.0

# Add patches under patches/ or list them here, e.g.:
# patches:
#   - path: patches/db.yaml
#     target:
#       kind: Job
#       name: db
